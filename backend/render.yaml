services:
  - type: web
    name: algomentor-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MISTRAL_API_KEY
        sync: false          # you paste this manually in Render dashboard
      - key: APP_ENV
        value: production
